<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-index">

  <!-- 🔽 Navigation Bar -->
<nav class="navbar navbar-expand-lg custom-navbar py-2">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="W Logo" style="height: 34px;">
      <span class="fw-bold wind-logo-text">WIND</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto nav-glow">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/converter' %}active{% endif %}" href="/converter">Currency Converter</a>
        </li>
      </ul>
    </div>
  </div>
</nav>


  <!-- 🔽 Main Content -->
  <div class="container text-center mt-5">
<h1 class="main-title">🗺️WIND</h1>
<p class="tagline">Weather & Information for Nation’s Data</p>

    <form action="/country" method="get" class="mt-4">
      <div class="input-group custom-search-bar mx-auto">
        <span class="input-group-text search-icon">
          <i class="bi bi-search"></i>
        </span>
        <input list="countries" name="country" id="country" class="form-control" placeholder="Enter country name" required>
        <datalist id="countries"></datalist>
        <button class="btn btn-primary" type="submit">Search</button>
      </div>
    </form>

    {% if error %}
      <div class="alert alert-danger mt-3">{{ error }}</div>
    {% endif %}
  </div>

  <script src="{{ url_for('static', filename='js/autocomplete.js') }}"></script>
</body>
</html>
